# ── Phyto E-Commerce Tenant Stack ────────────────────────────────────────────
# Generated by provisioning API. DO NOT edit manually.
# Tenant: {{SLUG}}
# Domain: {{DOMAIN}}
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:

  # ── PrestaShop ──────────────────────────────────────────────────────────────
  prestashop_{{SLUG}}:
    image: prestashop/prestashop:8-apache
    container_name: ps_{{SLUG}}
    restart: unless-stopped
    depends_on:
      mysql_{{SLUG}}:
        condition: service_healthy
      redis_{{SLUG}}:
        condition: service_started
    environment:
      DB_SERVER:         mysql_{{SLUG}}
      DB_NAME:           ps_{{SLUG}}
      DB_USER:           ps_{{SLUG}}
      DB_PASSWD:         "{{MYSQL_PASSWORD}}"
      PS_DOMAIN:         "{{DOMAIN}}"
      PS_FOLDER_ADMIN:   "{{PS_ADMIN_PATH}}"
      PS_ADMIN_MAIL:     "{{PS_ADMIN_EMAIL}}"
      PS_ADMIN_PASSWD:   "{{PS_ADMIN_PASSWORD}}"
      PS_COUNTRY:        IN
      PS_CURRENCY:       INR
      PS_LANGUAGE:       en
      PS_INSTALL_AUTO:   1
      PS_DEL_DEMO_PRODUCTS: 1
      DISABLE_MAKE:      1
    volumes:
      - ps_data_{{SLUG}}:/var/www/html
    networks:
      - tenant_{{SLUG}}
      - traefik_public
    mem_limit: 1536m
    cpus: "2.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/index.php?controller=health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.{{SLUG}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{SLUG}}.entrypoints=websecure"
      - "traefik.http.routers.{{SLUG}}.tls=true"
      - "traefik.http.routers.{{SLUG}}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.{{SLUG}}.middlewares=secure-headers@file,compress@file"
      - "traefik.http.services.{{SLUG}}.loadbalancer.server.port=80"
      - "traefik.docker.network=traefik_public"

  # ── MySQL ───────────────────────────────────────────────────────────────────
  mysql_{{SLUG}}:
    image: mysql:8.0
    container_name: mysql_{{SLUG}}
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: "{{MYSQL_PASSWORD}}"
      MYSQL_DATABASE:      ps_{{SLUG}}
      MYSQL_USER:          ps_{{SLUG}}
      MYSQL_PASSWORD:      "{{MYSQL_PASSWORD}}"
    volumes:
      - mysql_data_{{SLUG}}:/var/lib/mysql
    networks:
      - tenant_{{SLUG}}
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password={{MYSQL_PASSWORD}}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    # No Traefik labels — MySQL is not exposed externally

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis_{{SLUG}}:
    image: redis:7-alpine
    container_name: redis_{{SLUG}}
    restart: unless-stopped
    command: redis-server --maxmemory 64mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data_{{SLUG}}:/data
    networks:
      - tenant_{{SLUG}}
    mem_limit: 128m
    cpus: "0.25"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  ps_data_{{SLUG}}:
    name: ps_data_{{SLUG}}
  mysql_data_{{SLUG}}:
    name: mysql_data_{{SLUG}}
  redis_data_{{SLUG}}:
    name: redis_data_{{SLUG}}

networks:
  tenant_{{SLUG}}:
    name: tenant_{{SLUG}}
    driver: bridge
    internal: true   # Isolated — no direct internet access for DB/Redis
  traefik_public:
    external: true   # Shared with Traefik for HTTP(S) routing
