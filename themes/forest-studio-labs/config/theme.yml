name: forest-studio-labs
display_name: Forest Studio Labs
version: 1.0.0
author:
  name: PhytoCommerce
  email: aphytoevolution@gmail.com
  url: https://phytolabs.in
parent: ~
use_parent_assets: false

assets:
  css:
    all:
      - id: fsl-theme
        path: assets/css/theme.css
        media: all
  js:
    all:
      - id: fsl-theme
        path: assets/js/theme.js
        position: bottom
        priority: 200

meta:
  compatibility:
    from: "8.0.0"
    to: ~
  available_layouts:
    layout-full-width:
      name: Full Width
      description: No side columns, ideal for product and content pages.
    layout-left-column:
      name: Left Column
      description: Category listing with left sidebar filter panel.

global_settings:
  hooks:
    custom_hooks:
      - name: displayFslHero
        title: FSL — Hero Banner
        description: Hook for the full-width hero banner on the homepage
      - name: displayFslFeaturedStrip
        title: FSL — Featured Category Strip
        description: Hook for the featured category strip below the hero
      - name: displayFslPromo
        title: FSL — Mid-page Promo Banner
        description: Hook for the mid-page promotional banner section
  image_types:
    cart_default:
      width: 125
      height: 125
      scope: [ products ]
    small_default:
      width: 98
      height: 98
      scope: [ products, categories, manufacturers, suppliers ]
    medium_default:
      width: 452
      height: 452
      scope: [ products, manufacturers, suppliers ]
    home_default:
      width: 250
      height: 250
      scope: [ products ]
    large_default:
      width: 800
      height: 800
      scope: [ products, manufacturers, suppliers ]
    category_default:
      width: 141
      height: 180
      scope: [ categories ]
    stores_default:
      width: 170
      height: 115
      scope: [ stores ]
    fsl_card:
      width: 480
      height: 600
      scope: [ products ]
    fsl_thumb:
      width: 80
      height: 80
      scope: [ products ]
    fsl_hero:
      width: 1600
      height: 700
      scope: [ categories ]
  configuration:
    - name: fsl_hero_headline
      default: "Where Nature Meets Home"
    - name: fsl_hero_subline
      default: "Rare & cultivated plants, curated for collectors and garden lovers"
    - name: fsl_hero_cta
      default: "Shop Collection"
    - name: fsl_hero_bg_url
      default: ""
    - name: fsl_accent_color
      default: "#4a7c59"

theme_settings:
  default_layout: layout-full-width
  layouts:
    category: layout-left-column
    best-sales: layout-left-column
    new-products: layout-left-column
    prices-drop: layout-left-column
    search: layout-left-column

columns:
  left: 3
  right: 9
