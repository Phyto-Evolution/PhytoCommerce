<nav>
  <a class="nav-logo" href="{{ .Site.Home.RelPermalink }}">🌿 Phyto<span>Commerce</span></a>
  <button class="nav-toggle" aria-label="Open menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-menu" id="nav-menu">
    <li><a href="{{ .Site.Home.RelPermalink }}">Home</a></li>
    <li><a href="{{ "modules/" | relURL }}">Modules</a></li>
    <li><a href="{{ .Site.Params.repoBase }}" target="_blank" rel="noopener">GitHub ↗</a></li>
  </ul>
</nav>
<script>
(function(){
  var btn = document.querySelector('.nav-toggle');
  var menu = document.getElementById('nav-menu');
  if (!btn || !menu) return;
  btn.addEventListener('click', function(){
    var open = menu.classList.toggle('nav-open');
    btn.setAttribute('aria-expanded', String(open));
    btn.classList.toggle('is-open', open);
  });
  menu.querySelectorAll('a').forEach(function(a){
    a.addEventListener('click', function(){
      menu.classList.remove('nav-open');
      btn.classList.remove('is-open');
      btn.setAttribute('aria-expanded', 'false');
    });
  });
})();
</script>
