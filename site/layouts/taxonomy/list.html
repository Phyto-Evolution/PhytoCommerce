{{ define "main" }}
<section class="taxo-hero">
  <div class="taxo-hero-inner">
    <div class="taxo-hero-text">
      <h1>Botanical Taxonomy Standard</h1>
      <p>PhytoCommerce modular plant family data — species, genera, common names and cultivars. Used by the <code>phyto_grex_registry</code> module and all platform ports.</p>
    </div>
    <div class="taxo-hero-stats" id="taxo-stats">
      <div class="taxo-stat"><div class="taxo-stat-num" id="ts-categories">—</div><div class="taxo-stat-label">Categories</div></div>
      <div class="taxo-stat"><div class="taxo-stat-num" id="ts-packs">—</div><div class="taxo-stat-label">Packs</div></div>
      <div class="taxo-stat"><div class="taxo-stat-num" id="ts-genera">—</div><div class="taxo-stat-label">Genera</div></div>
      <div class="taxo-stat"><div class="taxo-stat-num" id="ts-species">—</div><div class="taxo-stat-label">Species</div></div>
    </div>
  </div>
</section>

<div class="taxo-layout">

  <aside class="taxo-sidebar" id="taxo-sidebar">
    <div class="taxo-sidebar-inner">
      <div class="taxo-sidebar-title">Categories</div>
      <nav id="taxo-sidenav" aria-label="Jump to category"></nav>
    </div>
  </aside>

  <div class="taxo-main">
    <div id="taxo-loading" class="taxo-loading-msg">Loading taxonomy data…</div>
    <div id="taxo-content" style="display:none">
      <div class="taxo-pills-bar" id="taxo-pills" aria-label="Jump to category"></div>
      <div id="taxo-tree"></div>
    </div>
  </div>

</div>

<script>
(function(){
  var RAW     = 'https://raw.githubusercontent.com/Phyto-Evolution/PhytoCommerce/main/taxonomy/';
  var content = document.getElementById('taxo-content');
  var tree    = document.getElementById('taxo-tree');
  var pillBar = document.getElementById('taxo-pills');
  var sidenav = document.getElementById('taxo-sidenav');
  var loading = document.getElementById('taxo-loading');

  function esc(s){ return s ? String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') : ''; }

  var STATUS_CFG = {
    critically_endangered: { label:'CR',   color:'#b91c1c', bg:'#fef2f2' },
    endangered:            { label:'EN',   color:'#c2410c', bg:'#fff7ed' },
    vulnerable:            { label:'VU',   color:'#b45309', bg:'#fffbeb' },
    cites_appendix_i:      { label:'CITES I',  color:'#7c3aed', bg:'#f5f3ff' },
    cites_appendix_ii:     { label:'CITES II', color:'#5b21b6', bg:'#f5f3ff' },
    extinct:               { label:'EX',   color:'#4b5563', bg:'#f9fafb' },
  };

  function statusBadge(s){
    if (!s || s === 'least_concern' || s === 'not_evaluated' || s === '') return '';
    var cfg = STATUS_CFG[s];
    if (!cfg) return '';
    return '<span class="taxo-status-badge" style="color:'+cfg.color+';background:'+cfg.bg+';border-color:'+cfg.color+'44">'+cfg.label+'</span>';
  }

  var CAT_ICONS = {
    carnivorous:'🪤', aroids:'🌿', orchids:'🌸', succulents:'🌵',
    bromeliads:'🍍', banana:'🍌', palms:'🌴', horticulture:'🌾',
    fruits:'🍎', vegetables:'🥦', pulses:'🫘', cashcrops:'🌾'
  };
  function catIcon(id){ return CAT_ICONS[id] || '🌱'; }

  function pillBadge(text, cls){
    return '<span class="taxo-pill taxo-pill--'+cls+'">'+esc(text)+'</span>';
  }

  function renderPack(pack){
    var genera = pack.genera || [];
    var speciesCount  = genera.reduce(function(n,g){ return n + (g.species||[]).length; }, 0);
    var cultivarCount = genera.reduce(function(n,g){
      return n + (g.species||[]).reduce(function(m,s){ return m+(s.cultivars||[]).length; }, 0);
    }, 0);

    var generaHtml = genera.map(function(g){
      var speciesList = (g.species||[]).map(function(s){
        var cvCount = (s.cultivars||[]).length;
        var cvHtml  = cvCount ? '<span class="taxo-cv-pill">'+cvCount+' cv.</span>' : '';
        var stBadge = statusBadge(s.conservation_status);
        var commonHtml = s.common_name ? '<span class="taxo-sp-common">'+esc(s.common_name)+'</span>' : '';
        return '<li class="taxo-sp">'
          +'<span class="taxo-sp-name">'+esc(s.full_name)+'</span>'
          +commonHtml+cvHtml+stBadge
          +'</li>';
      }).join('');

      return '<div class="taxo-genus-block">'
        +'<button class="taxo-genus-toggle" onclick="this.parentNode.classList.toggle(\'open\')" aria-expanded="false">'
          +'<span class="taxo-genus-label">'
            +'<span class="taxo-genus-sci">'+esc(g.genus)+'</span>'
            +(g.common_name?'<span class="taxo-genus-com">'+esc(g.common_name)+'</span>':'')
          +'</span>'
          +'<span class="taxo-genus-meta">'
            +'<span class="taxo-genus-count">'+((g.species||[]).length)+' sp.</span>'
            +'<svg class="taxo-chevron-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 7l3 3 3-3"/></svg>'
          +'</span>'
        +'</button>'
        +'<ul class="taxo-sp-list">'+speciesList+'</ul>'
        +'</div>';
    }).join('');

    var descHtml = pack.description
      ? '<p class="taxo-pack-desc">'+esc(pack.description.replace(/<[^>]+>/g,'').slice(0,320))+(pack.description.length>320?'…':'')+'</p>'
      : '';

    return '<div class="taxo-pack-card">'
      +'<div class="taxo-pack-head">'
        +'<div class="taxo-pack-titles">'
          +'<div class="taxo-pack-family">'+esc(pack.family||pack.pack_id)+'</div>'
          +(pack.common_name?'<div class="taxo-pack-common">'+esc(pack.common_name)+'</div>':'')
        +'</div>'
        +'<div class="taxo-pack-counts">'
          +pillBadge(genera.length+' genera','green')
          +pillBadge(speciesCount+' species','blue')
          +(cultivarCount?pillBadge(cultivarCount+' cultivars','purple'):'')
        +'</div>'
      +'</div>'
      +descHtml
      +'<div class="taxo-genera-wrap">'+generaHtml+'</div>'
      +'</div>';
  }

  function renderCategory(cat, packs){
    var packsHtml = packs.map(renderPack).join('');
    return '<section class="taxo-cat-section" id="cat-'+esc(cat.id)+'">'
      +'<header class="taxo-cat-header">'
        +'<span class="taxo-cat-emoji">'+catIcon(cat.id)+'</span>'
        +'<span class="taxo-cat-name">'+esc(cat.name)+'</span>'
        +'<span class="taxo-cat-badge">'+packs.length+' pack'+(packs.length!==1?'s':'')+'</span>'
      +'</header>'
      +packsHtml
      +'</section>';
  }

  fetch(RAW + 'index.json')
    .then(function(r){ return r.json(); })
    .then(function(idx){
      var s = idx.summary || {};
      document.getElementById('ts-categories').textContent = s.total_categories || idx.categories.length;
      document.getElementById('ts-packs').textContent     = s.total_packs    || '—';
      document.getElementById('ts-genera').textContent    = s.total_genera   || '—';
      document.getElementById('ts-species').textContent   = s.total_species  || '—';

      return Promise.all(idx.categories.map(function(cat){
        return fetch(RAW + cat.index)
          .then(function(r){ return r.json(); })
          .then(function(catIdx){
            var packFiles = catIdx.packs || [];
            return Promise.all(packFiles.map(function(p){
              var pf = p.file || (cat.id+'/'+p.id+'.json');
              if (pf.indexOf('/') === -1) pf = cat.id+'/'+pf;
              return fetch(RAW + pf)
                .then(function(r){ return r.json(); })
                .catch(function(){ return null; });
            })).then(function(packs){
              return { cat: cat, packs: packs.filter(Boolean) };
            });
          })
          .catch(function(){ return { cat: cat, packs: [] }; });
      }));
    })
    .then(function(categories){
      loading.style.display = 'none';
      content.style.display = 'block';

      var pillsHtml = '';
      var sideHtml  = '';
      categories.forEach(function(c){
        var icon = catIcon(c.cat.id);
        pillsHtml += '<a class="taxo-pill-nav" href="#cat-'+esc(c.cat.id)+'">'+icon+' '+esc(c.cat.name)+'</a>';
        sideHtml  += '<a class="taxo-side-link" href="#cat-'+esc(c.cat.id)+'">'+icon+' '+esc(c.cat.name)+'</a>';
      });
      pillBar.innerHTML = pillsHtml;
      sidenav.innerHTML = sideHtml;

      tree.innerHTML = categories.map(function(c){ return renderCategory(c.cat, c.packs); }).join('');
    })
    .catch(function(){
      loading.textContent = 'Could not load taxonomy data. View directly on GitHub.';
    });
})();
</script>
{{ end }}
